openapi: 3.1.1
info:
  title: Idea2Tasks.Backend | v1
  version: 1.0.0
servers:
  - url: http://localhost:5091/
paths:
  /api/Project:
    post:
      tags:
        - Project
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectOnlyDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/ProjectOnlyDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ProjectOnlyDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
            text/json:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
    get:
      tags:
        - Project
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDTO"
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDTO"
            text/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDTO"
  /api/Project/{id}:
    get:
      tags:
        - Project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
            application/json:
              schema:
