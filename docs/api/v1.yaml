            text/json:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
    put:
      tags:
        - Project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectOnlyDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/ProjectOnlyDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ProjectOnlyDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
            text/json:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
    delete:
      tags:
        - Project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      responses:
        "200":
          description: OK
  /api/SubTask:
    post:
      tags:
        - SubTask
      parameters:
        - name: projectId
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubTaskDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/SubTaskDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/SubTaskDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
            application/json:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
            text/json:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
    get:
      tags:
        - SubTask
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubTaskDTO"
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubTaskDTO"
            text/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubTaskDTO"
  /api/SubTask/{id}:
    get:
      tags:
        - SubTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
            application/json:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
            text/json:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
    put:
      tags:
        - SubTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubTaskDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/SubTaskDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/SubTaskDTO"
        required: true
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
            application/json:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
            text/json:
              schema:
                $ref: "#/components/schemas/SubTaskDTO"
    delete:
      tags:
        - SubTask
      parameters:
        - name: id
