  /api/SubTask/p/{projectId}:
    get:
      tags:
        - SubTask
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubTaskDTO"
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubTaskDTO"
            text/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubTaskDTO"
components:
  schemas:
    ProjectDTO:
      required:
        - name
        - description
      type: object
      properties:
        id:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        name:
          maxLength: 50
          type: string
        description:
          maxLength: 1000
          type: string
        isCompleted:
          type: boolean
        subTasks:
          type:
            - "null"
            - array
          items:
            $ref: "#/components/schemas/SubTaskDTO"
    ProjectOnlyDTO:
      required:
        - name
        - description
      type: object
      properties:
        name:
          maxLength: 50
          type: string
        description:
          maxLength: 1000
          type: string
        isCompleted:
          type: boolean
    SubTaskDTO:
      required:
        - description
        - durationInHrs
      type: object
      properties:
        id:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        description:
          maxLength: 1000
          type: string
        isCompleted:
          type: boolean
        durationInHrs:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        projectId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
tags:
  - name: Project
  - name: SubTask
